<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIAVAC - Fòm Plent Viktim</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ececec;
padding:10px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header img{
width:100px;
height:100px;
object-fit:contain;
}

.header h1{
font-size:26px;
color:#003366;
margin-top:10px;
}

.header h2{
font-size:16px;
margin-top:5px;
color:#444;
}

.section-title{
background:#003366;
color:#fff;
padding:8px;
margin-top:20px;
margin-bottom:10px;
font-size:16px;
border-radius:5px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.col{
flex:1;
min-width:100%;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
font-size:14px;
}

input,textarea{
width:100%;
padding:10px;
border:1px solid #999;
border-radius:6px;
font-size:14px;
}

textarea{
resize:vertical;
height:80px;
}

.question{
margin-bottom:15px;
}

.signature{
display:flex;
flex-wrap:wrap;
justify-content:space-between;
margin-top:50px;
gap:20px;
}

.signature div{
width:100%;
text-align:center;
}

.line{
border-top:1px solid #000;
margin-top:50px;
}

button{
width:100%;
margin-top:20px;
background:#003366;
color:#fff;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0050a5;
}

@media (min-width:768px){
.col{min-width:48%}
.signature div{width:40%}
button{width:auto;padding:12px 25px}
.header img{width:120px;height:120px}
.header h1{font-size:28px}
.header h2{font-size:18px}
}

@media print{
button{display:none}
.question,.row,.section-title{
break-inside:avoid;
page-break-inside:avoid;
}
}

</style>

</head>

<body>

<div class="container" id="pdf">

<div class="header">
<img src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg">
<h1>SIAVAC</h1>

<h2>FÒM PLAINT VIKTIM</h2>
</div>

</div>

<div class="section-title">DESKRIPSYON PLENT LA</div>

<div class="question">

<textarea></textarea>
</div>

<div class="question">
<label>2. Kilè ensidan an te rive?</label>

</div>

<div class="question">
<label>3. Ki kote li te rive?</label>
<textarea></textarea>
</div>

<div class="question">
<label>4. Kijan ensidan an te kòmanse?</label>
<textarea></textarea>
</div>

<div class="question">
<label>5. Ki moun ou sispèk oswa ki enplike?</label>

<div class="question">

<div class="section-title">DEKLARASYON OFISYÈL</div>

<p style="font-size:14px;line-height:24px;text-align:justify;">
Mwen deklare tout enfòmasyon mwen bay yo se verite selon sa mwen konnen.
Mwen fè deklarasyon sa san fòs, san presyon.
</p>

<div class="signature">

<div>
<div class="line"></div>
Viktim
</div>

<div>
<div class="line"></div>
Ajan SIAVAC
</div>

</div>

<button onclick="downloadPDF()">📄 Telechaje PDF Plent</button>

</div>

<script>
function downloadPDF(){

const element = document.getElementById("pdf");

html2pdf().set({
margin:0.4,
filename:'SIAVAC_Plent_Viktim.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{
scale:2,
useCORS:true,
scrollY:0,
windowWidth:element.scrollWidth
},
jsPDF:{
unit:'mm',
format:'a4',
orientation:'portrait'
},
pagebreak:{
mode:['css','legacy','avoid-all']
}
}).from(element).save();
}
</script>

</body>
</html>
